spring.application.name=hotel-booking-backend
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotel_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.swagger-ui.path=/swagger-ui/index.html

app.jwt.secret=${JWT_SECRET:change-this-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.cookie-name=${JWT_COOKIE_NAME:HOTEL_AUTH}
app.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}
app.jwt.cookie-same-site=${JWT_COOKIE_SAME_SITE:Strict}

logging.level.org.springframework.security=INFO
